project_id = "avasyn"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/accounts"]
enable_signup = false

[auth.email]
enable_confirmations = false

[storage]
enabled = true

# External webhooks are called without a Supabase JWT (they authenticate via
# their own secret/signature), so JWT verification must be disabled for them.
[functions.zernio-webhook]
verify_jwt = false

[functions.heygen-webhook]
verify_jwt = false
